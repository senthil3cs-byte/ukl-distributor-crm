<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UKL Distributor CRM</title>
  <style>
    body{
      margin:0;font-family:Arial,sans-serif;background:#dfe9e2;
      display:flex;justify-content:center;align-items:center;min-height:100vh;
    }
    .card{
      background:#fff;padding:28px;border-radius:18px;width:420px;
      box-shadow:0 8px 30px rgba(0,0,0,.08);
    }
    h1{margin:0 0 6px;color:#0f6b3a;font-size:28px}
    .sub{margin:0 0 18px;color:#0f6b3a}
    input,button,select{
      width:100%;padding:14px;border-radius:12px;border:1px solid #cfd5d1;
      box-sizing:border-box;font-size:16px;margin-bottom:14px;
    }
    button{
      background:#148a3b;color:#fff;border:none;font-weight:700;cursor:pointer;
    }
    button:hover{background:#0f7431}
    .hint{font-size:14px;color:#444}
    .err{color:#d93025;margin-top:8px}
    .hidden{display:none}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:18px;
    }
    .layout{
      max-width:1100px;margin:24px auto;padding:0 16px;
    }
    .panel{
      background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.06);
      padding:18px;
    }
    table{
      width:100%;border-collapse:collapse;margin-top:16px;background:#fff;
    }
    th,td{
      border:1px solid #dfe5e1;padding:10px;text-align:left;font-size:14px;
    }
    th{background:#e8f4ec;color:#0f6b3a}
    .grid{
      display:grid;grid-template-columns:1fr 1fr;gap:18px;
    }
    @media (max-width: 900px){ .grid{grid-template-columns:1fr;} }
  </style>
</head>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <body>
  <div id="loginView" class="card">
    <h1>UKL Distributor CRM</h1>
    <p class="sub">Login to continue</p>
    <input id="username" value="admin" placeholder="Username" />
    <input id="password" value="1234" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <div class="hint">Default login: admin / 1234</div>
    <div id="loginError" class="err"></div>
  </div>

  <div id="appView" class="hidden" style="width:100%">
    <div class="layout">
      <div class="topbar">
        <h1 style="margin:0">UKL Distributor CRM</h1>
        <button style="width:auto;padding:10px 16px" onclick="logout()">Logout</button>
      </div>

      <div class="grid">
        <div class="panel">
          <h3>Add Distributor</h3>
          <input id="state" placeholder="State" value="Tamil Nadu" />
          <input id="district" placeholder="District" />
          <input id="distributor_name" placeholder="Distributor Name" />
          <input id="mobile" placeholder="Mobile" />
          <input id="email" placeholder="Email" />
          <button onclick="addDistributor()">Save</button>
          <div id="saveMsg"></div>
        </div>

        <div class="panel">
          <h3>Distributor List</h3>
          <input id="search" placeholder="Search..." oninput="renderTable()" />
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>State</th>
                <th>District</th>
                <th>Name</th>
                <th>Mobile</th>
                <th>Email</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];

    async function login() {
      const loginError = document.getElementById("loginError");
      loginError.textContent = "";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value.trim()
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          loginError.textContent = data.message || "Invalid login";
          return;
        }

        document.getElementById("loginView").classList.add("hidden");
        document.getElementById("appView").classList.remove("hidden");
        loadRows();
      } catch (e) {
        loginError.textContent = "Login request failed";
      }
    }

    function logout() {
      document.getElementById("appView").classList.add("hidden");
      document.getElementById("loginView").classList.remove("hidden");
    }

    async function loadRows() {
      const res = await fetch("/api/distributors");
      allRows = await res.json();
      renderTable();
    }

    function renderTable() {
      const q = document.getElementById("search").value.toLowerCase();
      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";

      allRows
        .filter(r =>
          (r.state || "").toLowerCase().includes(q) ||
          (r.district || "").toLowerCase().includes(q) ||
          (r.distributor_name || "").toLowerCase().includes(q) ||
          (r.mobile || "").toLowerCase().includes(q) ||
          (r.email || "").toLowerCase().includes(q)
        )
        .forEach(r => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${r.id || ""}</td>
            <td>${r.state || ""}</td>
            <td>${r.district || ""}</td>
            <td>${r.distributor_name || ""}</td>
            <td>${r.mobile || ""}</td>
            <td>${r.email || ""}</td>
          `;
          tbody.appendChild(tr);
        });
    }

    async function addDistributor() {
      const payload = {
        state: document.getElementById("state").value.trim(),
        district: document.getElementById("district").value.trim(),
        distributor_name: document.getElementById("distributor_name").value.trim(),
        mobile: document.getElementById("mobile").value.trim(),
        email: document.getElementById("email").value.trim()
      };

      const msg = document.getElementById("saveMsg");
      msg.textContent = "";

      try {
        const res = await fetch("/api/distributors", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error || "Save failed";
          msg.style.color = "red";
          return;
        }

        msg.textContent = "Saved successfully";
        msg.style.color = "green";

        document.getElementById("district").value = "";
        document.getElementById("distributor_name").value = "";
        document.getElementById("mobile").value = "";
        document.getElementById("email").value = "";

        loadRows();
      } catch (e) {
        msg.textContent = "Save request failed";
        msg.style.color = "red";
      }
    }
  </script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </body>
</html>
