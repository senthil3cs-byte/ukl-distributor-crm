<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GeoCRM</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet (keep for app view later) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #e8f5e9, #ffffff);
}

/* LOGIN PAGE */
#loginView {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* LOGO + TITLE */
.logo-section {
  text-align: center;
  margin-bottom: 20px;
}

.logo-section img {
  height: 90px;
}

.logo-title {
  font-size: 42px;
  font-weight: bold;
  color: #1b5e20;
}

.tagline {
  color: #444;
  letter-spacing: 2px;
  margin-top: 5px;
}

/* CARD */
.card {
  background: #fff;
  padding: 30px;
  border-radius: 18px;
  width: 350px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  text-align: center;
}

.card h2 {
  margin-bottom: 10px;
}

.card input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.card button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(to right, #0d47a1, #2e7d32);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.card button:hover {
  opacity: 0.9;
}

/* APP VIEW */
#appView {
  display: none;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logout {
  background: green;
  color: white;
  padding: 8px 15px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginView">

  <div class="logo-section">
    <img src="logo.png">
    <div class="logo-title">GeoCRM</div>
    <div class="tagline">MANAGE • MAP • PLAN • GROW</div>
  </div>

  <div class="card">
    <h2>Welcome Back</h2>
    <p>Sign in to continue</p>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

</div>

<!-- ================= APP ================= -->
<div id="appView">

  <div class="header">
    <h2>GeoCRM Dashboard</h2>
    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <p>✅ Login Successful — Your CRM loads here</p>

</div>

<script>
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  if (res.ok) {
    document.getElementById("loginView").style.display = "none";
    document.getElementById("appView").style.display = "block";
  } else {
    alert("Invalid login");
  }
}

function logout() {
  location.reload();
}
</script>

</body>
</html>
