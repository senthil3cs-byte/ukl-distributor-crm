<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GeoCRM</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #e8f5e9, #ffffff);
}

/* CENTER LOGIN */
#loginView {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  height: 90px;
}

.title {
  font-size: 40px;
  font-weight: bold;
  color: #1b5e20;
}

.tagline {
  color: #555;
}

/* CARD */
.card {
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* APP */
#appView {
  display: none;
  padding: 20px;
}

.logout {
  background: red;
  color: white;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView">

  <div class="logo">
    <img src="logo.jpg">
    <div class="title">GeoCRM</div>
    <div class="tagline">Manage • Map • Plan • Grow</div>
  </div>

  <div class="card">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

</div>

<!-- APP -->
<div id="appView">

  <h2>GeoCRM Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>

  <p>✅ Login Successful</p>

</div>

<script>
async function login() {
  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });

  if (res.ok) {
    document.getElementById("loginView").style.display = "none";
    document.getElementById("appView").style.display = "block";
  } else {
    alert("Invalid login");
  }
}

function logout() {
  location.reload();
}
</script>

</body>
</html>
