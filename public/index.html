<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UKL CRM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{font-family:Arial;background:#e6f2ea;margin:0}
.hidden{display:none}

.card{background:#fff;padding:15px;border-radius:12px;margin:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}

button{background:#148a3b;color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer}
.small-btn{padding:5px 8px;font-size:12px}

#map{height:500px}

.status-planned{background:orange;padding:3px 8px;border-radius:10px;color:#fff}
.status-visited{background:green;padding:3px 8px;border-radius:10px;color:#fff}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView">
  <div class="card">
    <img src="/logo.jpeg" width="100">
    <h2>UKL CRM Login</h2>
    <input id="username" value="admin"><br>
    <input id="password" value="1234" type="password"><br>
    <button onclick="login()">Login</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden">

<div class="card">
<h2>UKL Distributor CRM</h2>
<button onclick="logout()">Logout</button>
</div>

<!-- ADD -->
<div class="card">
<h3>Add Distributor</h3>
<input id="id" hidden>
<input id="state" placeholder="State">
<input id="district" placeholder="District">
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">
<input id="lat" placeholder="Lat" readonly>
<input id="lng" placeholder="Lng" readonly>
<button onclick="saveDistributor()">Save</button>
</div>

<!-- TOUR -->
<div class="card">
<h3>Business Tour</h3>

<select id="tourState"></select>
<input id="tourDate" type="date">

<div id="tourList"></div>

<button onclick="saveTour()">Save Tour</button>

</div>

<!-- VIEW TOUR -->
<div class="card">
<h3>View Tour</h3>
<input id="viewDate" type="date">
<button onclick="loadTour()">Load</button>

<div id="tourView"></div>
</div>

<!-- MAP -->
<div class="card">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map=L.map('map').setView([22,78],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];
let selectedStops=[];
let routeLine;

async function login(){
let res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});
let d=await res.json();
if(d.success){
loginView.classList.add('hidden');
appView.classList.remove('hidden');
loadStates();
}
}

function logout(){
appView.classList.add('hidden');
loginView.classList.remove('hidden');
}

async function loadStates(){
let res=await fetch('/api/states');
let s=await res.json();
tourState.innerHTML=s.map(x=>`<option>${x}</option>`).join('');
}

tourState.onchange=loadStateData;

async function loadStateData(){
let state=tourState.value;
let res=await fetch('/api/distributors/by-state/'+state);
let data=await res.json();

tourList.innerHTML='';
markers.forEach(m=>map.removeLayer(m));
markers=[];

data.forEach(r=>{
let lat=r.lat||13;
let lng=r.lng||80;

let m=L.marker([lat,lng]).addTo(map);

m.on('click',()=>{
toggleStop(r);
});

markers.push(m);

tourList.innerHTML+=`
<div onclick="toggleStop(${r.id})">${r.distributor_name}</div>
`;
});
}

function toggleStop(r){
if(typeof r==='number'){
// from list click
}
selectedStops.push(r);
drawRoute();
}

function drawRoute(){
if(routeLine)map.removeLayer(routeLine);

let pts=selectedStops.map(r=>[r.lat||13,r.lng||80]);

routeLine=L.polyline(pts,{color:'blue'}).addTo(map);
}

async function saveTour(){
await fetch('/api/tour-plans',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
visit_date:tourDate.value,
state:tourState.value,
stops:selectedStops
})
});
alert('Saved');
}

async function loadTour(){
let res=await fetch('/api/tour-plans/'+viewDate.value);
let data=await res.json();

tourView.innerHTML=data.map(r=>`
<div>
${r.distributor_name}
<span class="${r.status=='Visited'?'status-visited':'status-planned'}">${r.status}</span>
<button onclick="markDone(${r.id})">Done</button>
</div>
`).join('');
}

async function markDone(id){
await fetch('/api/tour-plans/status/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'Visited'})});
loadTour();
}

</script>

</body>
</html>
